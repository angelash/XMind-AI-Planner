project: XMind-AI-Planner
mode: pure_ai_continuous
completion_rule: all_tasks_done_and_release_verified
git_policy:
  commit_push_on_each_task_done: false
  commit_message_template: 'chore(task): complete {task_id}'
check:
  interval_minutes: 5
  policy:
  - if_any_task_in_status_developing_then_wait
  - if_no_task_in_status_developing_then_start_next_ready_task
task_status_flow:
- waiting
- developing
- diff_ready
- sync_ok
- build_ok
- done
- need_confirm
- failed
- canceled
