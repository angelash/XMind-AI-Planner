<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XMind AI Planner</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="./vendor/mind-elixir.js"></script>
  </head>
  <body>
    <header class="app-header">
      <h1>XMind AI Planner</h1>
      <p>Frontend bootstrap with MindElixir mount point.</p>
    </header>
    <main>
      <section class="editor-toolbar" aria-label="Mind map editor toolbar">
        <button id="btn-add-child" type="button">Add Child</button>
        <button id="btn-edit-node" type="button">Edit Node</button>
        <button id="btn-delete-node" type="button">Delete Node</button>
        <button id="btn-toggle-fold" type="button">Toggle Fold</button>
        <button id="btn-zoom-in" type="button">Zoom In</button>
        <button id="btn-zoom-out" type="button">Zoom Out</button>
        <button id="btn-center" type="button">Center</button>
        <span id="editor-status" class="editor-status">No node selected</span>
      </section>
      <section id="mindmap" class="mindmap-canvas"></section>
      <pre id="fallback" class="fallback hidden"></pre>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
