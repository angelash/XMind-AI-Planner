name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pytest

      - name: Lint (syntax)
        run: python -m compileall -q backend tests

      - name: Test
        run: python -m pytest -q

      - name: Build checks
        run: python scripts/build_check.py
